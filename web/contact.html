<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GastroHub — Kontakt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --color-bg:      #F5F0EB;
            --color-primary: #B28A6E;
            --color-dark:    #8B6F47;
            --color-text:    #2C2C2C;
            --color-light:   #7A7A7A;
            --color-white:   #FFFFFF;
            --radius:        14px;
        }
        body { font-family: 'Inter', sans-serif; background: var(--color-bg); color: var(--color-text); line-height: 1.6; }

        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(245,240,235,0.92); backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(178,138,110,0.15);
            padding: 0 1.5rem; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .nav-logo { font-size: 1.2rem; font-weight: 800; color: var(--color-primary); text-decoration: none; letter-spacing: -0.02em; }
        .nav-back { font-size: 0.9rem; color: var(--color-light); text-decoration: none; display: flex; align-items: center; gap: 0.3rem; }
        .nav-back:hover { color: var(--color-primary); }

        .page-wrap { max-width: 560px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }

        h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
        .page-sub { font-size: 0.95rem; color: var(--color-light); margin-bottom: 2.5rem; }

        .form-card { background: var(--color-white); border-radius: var(--radius); padding: 2rem; border: 1px solid rgba(178,138,110,0.12); }

        .form-field { margin-bottom: 1.25rem; }
        .form-field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--color-light); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: 0.04em; }
        .form-field input,
        .form-field textarea {
            width: 100%; padding: 0.7rem 0.9rem;
            border: 1.5px solid rgba(178,138,110,0.25); border-radius: 8px;
            font-size: 0.95rem; font-family: 'Inter', sans-serif;
            background: var(--color-bg); color: var(--color-text);
            outline: none; transition: border-color 0.15s;
        }
        .form-field input:focus,
        .form-field textarea:focus { border-color: var(--color-primary); }
        .form-field textarea { resize: vertical; min-height: 140px; }

        .btn-send {
            display: block; width: 100%;
            background: var(--color-primary); color: white;
            border: none; border-radius: 999px;
            padding: 0.9rem; font-size: 1rem; font-weight: 700;
            cursor: pointer; font-family: 'Inter', sans-serif;
            transition: background 0.15s;
        }
        .btn-send:hover { background: var(--color-dark); }

        .success-msg { display: none; text-align: center; padding: 2rem 1rem; }
        .success-msg .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .success-msg p { color: var(--color-light); }

        footer { border-top: 1px solid rgba(178,138,110,0.15); padding: 2rem 1.5rem; text-align: center; font-size: 0.83rem; color: var(--color-light); }
        footer a { color: var(--color-primary); text-decoration: none; }
        footer a:hover { text-decoration: underline; }
        .footer-inner { max-width: 700px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem 1.5rem; }

        @media (max-width: 480px) { .page-wrap { padding: 2rem 1.25rem 3rem; } .form-card { padding: 1.5rem; } }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="nav-logo">GastroHub</a>
        <a href="index.html" class="nav-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            Startseite
        </a>
    </nav>

    <div class="page-wrap">
        <h1>Kontakt</h1>
        <p class="page-sub">Fragen, Wünsche oder Feedback — wir freuen uns von dir zu hören.</p>

        <div class="form-card">
            <div id="contact-form">
                <div class="form-field">
                    <label>Name</label>
                    <input type="text" id="c-name" placeholder="Dein Name">
                </div>
                <div class="form-field">
                    <label>E-Mail</label>
                    <input type="email" id="c-email" placeholder="deine@email.de">
                </div>
                <div class="form-field">
                    <label>Betreff</label>
                    <input type="text" id="c-subject" placeholder="Worum geht es?">
                </div>
                <div class="form-field">
                    <label>Nachricht</label>
                    <textarea id="c-message" placeholder="Deine Nachricht…"></textarea>
                </div>
                <button class="btn-send" onclick="sendContact()">Nachricht senden</button>
            </div>
            <div class="success-msg" id="contact-success">
                <div class="icon">✅</div>
                <h3 style="margin-bottom:0.5rem;">Nachricht gesendet!</h3>
                <p>Wir melden uns so schnell wie möglich bei dir.</p>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-inner">
            <span>© 2026 GastroHub</span>
            <span>·</span>
            <a href="impressum.html">Impressum</a>
            <span>·</span>
            <a href="datenschutz.html">Datenschutz</a>
            <span>·</span>
            <a href="mailto:kontakt@gastrohub.de">kontakt@gastrohub.de</a>
        </div>
    </footer>

    <script>
        function sendContact() {
            const name    = document.getElementById('c-name').value.trim();
            const email   = document.getElementById('c-email').value.trim();
            const subject = document.getElementById('c-subject').value.trim();
            const message = document.getElementById('c-message').value.trim();
            if (!name || !email || !message) { alert('Bitte Name, E-Mail und Nachricht ausfüllen.'); return; }
            const body = encodeURIComponent('Name: ' + name + '\nE-Mail: ' + email + '\n\n' + message);
            const sub  = encodeURIComponent(subject || 'Kontaktanfrage von ' + name);
            window.location.href = 'mailto:kontakt@gastrohub.de?subject=' + sub + '&body=' + body;
            document.getElementById('contact-form').style.display    = 'none';
            document.getElementById('contact-success').style.display = 'block';
        }
    </script>
</body>
</html>
