<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GastroHub - Registrieren</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-primary:      #B28A6E;
            --color-primary-dark: #9A7558;
            --color-bg:           #F9F5F1;
            --color-gray:         #F5F0EB;
            --color-text:         #404040;
            --color-text-light:   #999;
            --color-border:       #E5E5E5;
            --color-red:          #E57373;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--color-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-container {
            background: white;
            border-radius: 24px;
            padding: 48px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .auth-logo h1 {
            font-size: 32px;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 6px;
        }

        .auth-logo p {
            font-size: 14px;
            color: var(--color-text-light);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .input-group label {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text);
        }

        .input-group input {
            padding: 14px 16px;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
            color: var(--color-text);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(178,138,110,0.12);
        }

        .input-group input::placeholder { color: #CCC; }

        .field-error {
            color: var(--color-red);
            font-size: 13px;
            margin-top: -4px;
            display: none;
        }

        .auth-error {
            color: var(--color-red);
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .auth-success {
            color: var(--color-primary);
            font-size: 13px;
            text-align: center;
            display: none;
        }

        .auth-button {
            padding: 16px;
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 6px;
        }

        .auth-button:hover  { background: var(--color-primary-dark); transform: translateY(-1px); }
        .auth-button:active { transform: translateY(0); }

        .auth-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--color-text-light);
        }

        .auth-link a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .auth-container { padding: 32px 24px; }
            .auth-logo h1   { font-size: 26px; }
        }
    </style>
</head>
<body>

<div class="auth-container">

    <div class="auth-logo">
        <h1>GastroHub</h1>
        <p>Neues Konto erstellen</p>
    </div>

    <div class="auth-form">
        <div class="input-group">
            <label for="reg-restaurant">Restaurant-Name</label>
            <input type="text" id="reg-restaurant" placeholder="z.B. Pizzeria Roma" autocomplete="organization">
            <div class="field-error" id="err-restaurant"></div>
        </div>
        <div class="input-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" placeholder="admin@restaurant.de" autocomplete="email">
            <div class="field-error" id="err-email"></div>
        </div>
        <div class="input-group">
            <label for="reg-password">Passwort</label>
            <input type="password" id="reg-password" placeholder="Mind. 8 Zeichen, Groß-, Zahl, Sonderzeichen" autocomplete="new-password">
            <div class="field-error" id="err-password"></div>
        </div>
        <div class="input-group">
            <label for="reg-password2">Passwort wiederholen</label>
            <input type="password" id="reg-password2" placeholder="Passwort bestätigen" autocomplete="new-password">
            <div class="field-error" id="err-password2"></div>
        </div>

        <div id="reg-error" class="auth-error"></div>
        <div id="reg-success" class="auth-success"></div>

        <button class="auth-button" onclick="register()">Registrieren</button>
    </div>

    <div class="auth-link">
        Bereits ein Konto? <a href="login.html">Jetzt einloggen →</a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/shared/db.js"></script>
<script>

function showFieldError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
}

function clearFieldErrors() {
    document.querySelectorAll('.field-error').forEach(el => {
        el.textContent = '';
        el.style.display = 'none';
    });
    document.getElementById('reg-error').style.display = 'none';
}

function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function validatePassword(pw) {
    if (pw.length < 8)             return 'Passwort muss mindestens 8 Zeichen haben.';
    if (!/[A-Z]/.test(pw))         return 'Passwort muss mindestens einen Großbuchstaben enthalten.';
    if (!/[0-9]/.test(pw))         return 'Passwort muss mindestens eine Zahl enthalten.';
    if (!/[^A-Za-z0-9]/.test(pw))  return 'Passwort muss mindestens ein Sonderzeichen enthalten.';
    return null;
}

async function register() {
    const restaurant  = document.getElementById('reg-restaurant').value.trim();
    const email       = document.getElementById('reg-email').value.trim();
    const password    = document.getElementById('reg-password').value;
    const password2   = document.getElementById('reg-password2').value;
    const errorDiv    = document.getElementById('reg-error');
    const successDiv  = document.getElementById('reg-success');

    clearFieldErrors();
    successDiv.style.display = 'none';

    let valid = true;

    if (restaurant.length < 3) {
        showFieldError('err-restaurant', 'Restaurant-Name muss mindestens 3 Zeichen haben.');
        valid = false;
    }
    if (!email) {
        showFieldError('err-email', 'Bitte eine Email-Adresse eingeben.');
        valid = false;
    } else if (!validateEmail(email)) {
        showFieldError('err-email', 'Bitte eine gültige Email-Adresse eingeben.');
        valid = false;
    }
    const pwError = validatePassword(password);
    if (pwError) {
        showFieldError('err-password', pwError);
        valid = false;
    }
    if (!password2) {
        showFieldError('err-password2', 'Bitte das Passwort wiederholen.');
        valid = false;
    } else if (password !== password2) {
        showFieldError('err-password2', 'Passwörter stimmen nicht überein.');
        valid = false;
    }

    if (!valid) return;

    const { data, error } = await db.auth.signUp({ email, password });
    if (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
        return;
    }

    const userId = data.user?.id;
    if (userId) {
        const { error: dbError } = await db
            .from('planit_restaurants')
            .insert({ user_id: userId, name: restaurant });
        if (dbError) {
            errorDiv.textContent = 'Konto erstellt, aber Restaurant konnte nicht gespeichert werden: ' + dbError.message;
            errorDiv.style.display = 'block';
            return;
        }
    }

    successDiv.textContent = 'Registrierung erfolgreich! Bitte prüfe deine Email und klicke auf den Bestätigungslink.';
    successDiv.style.display = 'block';
}

document.addEventListener('keydown', e => {
    if (e.key === 'Enter') register();
});
</script>

</body>
</html>
