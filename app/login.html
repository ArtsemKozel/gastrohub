<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GastroHub - Login</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-primary:      #B28A6E;
            --color-primary-dark: #9A7558;
            --color-bg:           #F9F5F1;
            --color-gray:         #F5F0EB;
            --color-text:         #404040;
            --color-text-light:   #999;
            --color-border:       #E5E5E5;
            --color-red:          #E57373;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--color-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-container {
            background: transparent;
            border-radius: 24px;
            padding: 48px;
            max-width: 440px;
            width: 100%;
            box-shadow: none;
            border: none;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .auth-logo h1 {
            font-size: 32px;
            font-weight: 600;
            color: #B28A6E;
            margin-bottom: 6px;
        }

        .auth-logo p {
            font-size: 14px;
            color: var(--color-text-light);
        }

        /* Tabs */
        .login-tabs {
            display: flex;
            background: var(--color-gray);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
            gap: 4px;
        }

        .login-tab {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 9px;
            background: transparent;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-light);
            cursor: pointer;
            transition: all 0.2s;
        }

        .login-tab.active {
            background: white;
            color: var(--color-text);
            box-shadow: 0 1px 6px rgba(0,0,0,0.08);
        }

        /* Form */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .input-group label {
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text);
        }

        .input-group input {
            padding: 14px 16px;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
            color: var(--color-text);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(178,138,110,0.12);
        }

        .input-group input::placeholder { color: #CCC; }

        .auth-error {
            color: var(--color-red);
            font-size: 13px;
            margin-top: -6px;
            display: none;
        }

        .auth-button {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--color-primary);
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 16px auto 0;
        }

        .auth-button:hover  { background: var(--color-primary-dark); transform: translateY(-1px); }
        .auth-button:active { transform: translateY(0); }

        .auth-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--color-text-light);
        }

        .auth-link a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-link a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .auth-container { padding: 32px 24px; }
            .auth-logo h1   { font-size: 26px; }
        }
    </style>
</head>
<body>

<div class="auth-container">

    <div class="auth-logo">
        <h1>GastroHub</h1>
        <p>Schichtplanung &amp; Team-Organisation</p>
    </div>

    <!-- TABS -->
    <div class="login-tabs">
        <button class="login-tab" onclick="switchLoginTab('employee')">Mitarbeiter</button>
        <button class="login-tab active" onclick="switchLoginTab('admin')">Admin</button>
    </div>

    <!-- MITARBEITER LOGIN -->
    <div id="employee-login" style="display:none;">
        <div class="auth-form">
            <div class="input-group">
                <label for="emp-number">Kürzel</label>
                <input type="text" id="emp-number" placeholder="z.B. AnMu" autocomplete="username">
            </div>
            <div class="input-group">
                <label for="emp-password">PIN</label>
                <input type="password" id="emp-password" placeholder="••••" autocomplete="current-password">
            </div>
            <div id="emp-error" class="auth-error"></div>
            <button class="auth-button" onclick="loginEmployee()"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
        </div>
    </div>

    <!-- ADMIN LOGIN -->
    <div id="admin-login">
        <div class="auth-form">
            <div class="input-group">
                <label for="admin-email">Email</label>
                <input type="email" id="admin-email" placeholder="admin@restaurant.de" autocomplete="email">
            </div>
            <div class="input-group">
                <label for="admin-password">Passwort</label>
                <input type="password" id="admin-password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <div id="admin-error" class="auth-error"></div>
            <button class="auth-button" onclick="loginAdmin()"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></button>
        </div>
        <div class="auth-link">
            Noch kein Konto? <a href="register.html">Jetzt registrieren →</a>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/shared/db.js"></script>
<script src="js/shared/auth.js"></script>

</body>
</html>
