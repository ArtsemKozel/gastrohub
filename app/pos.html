<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>GastroHub</title>
    <style>
        :root {
            --color-primary:      #B28A6E;
            --color-primary-dark: #9A7558;
            --color-bg:           #F5F0EB;
            --color-card:         #FFFFFF;
            --color-text:         #2D2D2D;
            --color-text-light:   #888888;
            --color-green:        #4CAF7D;
            --color-red:          #E05555;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--color-bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        body.employee-view {
            align-items: flex-start;
            padding: 0;
        }

        #pos-root {
            width: 100%;
            max-width: 420px;
        }

        body.employee-view #pos-root {
            max-width: 100%;
        }

        .pos-card {
            background: var(--color-bg);
            border-radius: 20px;
            padding: 1.75rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .pos-header {
            text-align: center;
        }

        .pos-logo {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--color-primary);
            letter-spacing: -0.5px;
            margin-bottom: 0.25rem;
        }

        .pos-clock-display {
            background: var(--color-primary);
            border-radius: 14px;
            padding: 1.25rem;
            text-align: center;
            color: white;
        }

        .pos-clock-display .time {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            line-height: 1;
        }

        .pos-clock-display .date {
            font-size: 0.85rem;
            opacity: 0.85;
            margin-top: 0.35rem;
        }

        /* hide number input arrows */
        #pos-pin-input::-webkit-outer-spin-button,
        #pos-pin-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .pos-error {
            text-align: center;
            color: var(--color-red);
            font-size: 0.85rem;
            margin-top: 0.75rem;
            min-height: 1.2em;
        }

        /* Employee screen */
        .pos-employee-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .pos-emp-info {
            flex: 1;
            text-align: center;
        }

        .pos-back-btn {
            background: white;
            border: none;
            border-radius: 10px;
            width: 2.4rem;
            height: 2.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-primary);
            font-size: 1.2rem;
            flex-shrink: 0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }

        .pos-emp-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--color-text);
            line-height: 1.2;
        }

        .pos-emp-dept {
            font-size: 0.78rem;
            color: var(--color-text-light);
            margin-top: 0.15rem;
        }

        .pos-clock-display.on-break {
            background: #C68A1A;
        }

        .pos-action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .pos-action-btn {
            border: none;
            border-radius: 14px;
            padding: 1.1rem 0.5rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.08s;
        }

        .pos-action-btn:active  { transform: scale(0.97); }
        .pos-action-btn:disabled { opacity: 0.35; cursor: default; transform: none; }

        .pos-action-btn.clock-in    { background: var(--color-green); color: white; }
        .pos-action-btn.clock-out   { background: var(--color-primary); color: white; }
        .pos-action-btn.break-start { background: white; color: var(--color-text); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .pos-action-btn.break-end   { background: var(--color-green); color: white; }

        .pos-shift-info {
            font-size: 0.82rem;
            color: var(--color-text-light);
            text-align: center;
            padding: 0.6rem;
            background: white;
            border-radius: 10px;
        }

        .pos-toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #2D2D2D;
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 24px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .pos-toast.show { opacity: 1; }

        .pos-loading {
            text-align: center;
            padding: 2rem;
            color: var(--color-text-light);
        }
    </style>
</head>
<body>
    <div id="pos-root"><div class="pos-loading">Lädt…</div></div>
    <div class="pos-toast" id="pos-toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/shared/db.js?v=20260425105711"></script>
    <script src="js/pos/breaks.js?v=20260425105711"></script>
    <script src="js/pos/clock.js?v=20260425105711"></script>
</body>
</html>
